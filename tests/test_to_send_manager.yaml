model: "yolov8n-cls.pt"
type: "yolo"
train:
  batch: 8
  data: /datasets/examples/clasification/colorball.v8i.multiclass/
  epochs: 1
  imgsz: 320
  device: 0
sweeper:
  version: 1
  algorithm: optuna
  direction: maximize
  fitness: "metrics/accuracy_top1"
  study_name: "test_fix_v1"
  tune: false
  sampler: "TPESampler"
  n_trials: 5
  priority: "low"

extras:
  gpu:
    id: 0
    limit: 0.95
metadata:
  content: "Este es un experimento de clasificación de imágenes."
  author: "William Rodriguez"
  documentation: "Este modelo fue entrenado con datos del 2025."