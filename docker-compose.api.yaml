services:
  gui:
    build: ./interfaz
    image: wisrovi/train_service:interfaz_ui_v1.0.0
    ports:
      - "23444:7860"
    environment:
      - API_URL=${API_URL:-http://localhost:23442}
    volumes:
      - ./interfaz:/app
    networks:
      - train_service

networks:
  train_service:
    name: train_service
    external: true
